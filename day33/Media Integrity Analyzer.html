<!DOCTYPE html>
<html lang="en" class="theme-midnight">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Media Integrity Analyzer</title>
<style>
  :root{
    --font-display: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  html.theme-midnight{
    --bg:#0B1120; --surface:#131B2E; --surface-2:#182242; --border:#26324f;
    --accent:#D4AF37; --accent-rgb:212,175,55; --accent-contrast:#0B1120;
    --text:#EDEAE3; --muted:#98A3C0;
    --good:#34D399; --good-dim:rgba(52,211,153,0.16);
    --warn:#FBBF24; --warn-dim:rgba(251,191,36,0.18);
    --bad:#F87171; --bad-dim:rgba(248,113,113,0.16);
  }
  html.theme-orange{
    --bg:#FAF4EC; --surface:#FFFFFF; --surface-2:#F3E9DC; --border:#EAE0D3;
    --accent:#CC7A4D; --accent-rgb:204,122,77; --accent-contrast:#FFFFFF;
    --text:#2B211A; --muted:#8A7B6D;
    --good:#1F9D6F; --good-dim:rgba(31,157,111,0.14);
    --warn:#B8790A; --warn-dim:rgba(184,121,10,0.16);
    --bad:#C23B3B; --bad-dim:rgba(194,59,59,0.12);
  }
  html.theme-crimson{
    --bg:#161213; --surface:#201A1B; --surface-2:#271F20; --border:#3A2C2E;
    --accent:#C0293B; --accent-rgb:192,41,59; --accent-contrast:#FFFFFF;
    --text:#F2E9E4; --muted:#A08F8C;
    --good:#3FBF83; --good-dim:rgba(63,191,131,0.16);
    --warn:#E0A426; --warn-dim:rgba(224,164,38,0.18);
    --bad:#E2536A; --bad-dim:rgba(226,83,106,0.18);
  }
  html.theme-emerald{
    --bg:#0E1A16; --surface:#142722; --surface-2:#193029; --border:#274038;
    --accent:#C9A227; --accent-rgb:201,162,39; --accent-contrast:#0E1A16;
    --text:#EDEFE9; --muted:#8FAE9E;
    --good:#4ADE80; --good-dim:rgba(74,222,128,0.16);
    --warn:#E0B93E; --warn-dim:rgba(224,185,62,0.18);
    --bad:#F16A6A; --bad-dim:rgba(241,106,106,0.16);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    transition:background .3s ease, color .3s ease;
  }
  h1,h2,h3{ font-family:var(--font-display); margin:0; letter-spacing:-0.01em; }
  p{ line-height:1.65; color:var(--muted); margin:0; }
  ::selection{ background:rgba(var(--accent-rgb),0.25); }

  .shell{ max-width:880px; margin:0 auto; padding:28px 20px 120px; }
  @media (min-width:720px){ .shell{ padding:40px 32px 140px; } }

  .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--accent); display:flex; align-items:center; gap:8px; margin-bottom:10px;
  }
  .eyebrow::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px rgba(var(--accent-rgb),0.6); }

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:14px;
    padding:22px; position:relative; box-shadow:0 6px 28px rgba(0,0,0,0.18);
  }
  .card::before{
    content:''; position:absolute; top:0; left:22px; right:22px; height:2px;
    background:linear-gradient(90deg, transparent, rgba(var(--accent-rgb),0.5), transparent);
  }

  .btn{
    font-family:var(--font-body); font-weight:600; font-size:14.5px; border-radius:9px;
    border:1px solid var(--border); background:var(--surface-2); color:var(--text);
    padding:12px 20px; cursor:pointer; transition:all .18s ease; display:inline-flex; align-items:center; gap:8px;
  }
  .btn:hover{ border-color:var(--accent); transform:translateY(-1px); box-shadow:0 6px 18px rgba(var(--accent-rgb),0.15); }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .btn-primary{ background:var(--accent); color:var(--accent-contrast); border-color:var(--accent); }
  .btn-primary:hover{ box-shadow:0 8px 22px rgba(var(--accent-rgb),0.35); }
  .btn-ghost{ background:transparent; }
  .btn-block{ width:100%; justify-content:center; }

  .fade-in{ animation:fadeIn .4s ease both; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .stagger > *{ animation:fadeIn .4s ease both; }
  .stagger > *:nth-child(1){animation-delay:.02s;} .stagger > *:nth-child(2){animation-delay:.07s;}
  .stagger > *:nth-child(3){animation-delay:.12s;} .stagger > *:nth-child(4){animation-delay:.17s;}
  @media (prefers-reduced-motion: reduce){ .fade-in,.stagger>*{ animation:none !important; } }

  .grid{ display:grid; gap:12px; grid-template-columns:1fr; }
  @media (min-width:640px){ .grid-2{ grid-template-columns:1fr 1fr; } .grid-3{ grid-template-columns:repeat(3,1fr); } }

  .option{
    text-align:left; cursor:pointer; background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:16px 18px; transition:all .18s ease; color:var(--text); font-family:var(--font-body);
    display:flex; flex-direction:column; gap:4px;
  }
  .option:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .option.selected{ border-color:var(--accent); background:rgba(var(--accent-rgb),0.08); box-shadow:0 0 0 1px var(--accent) inset; }
  .option-title{ font-weight:600; font-size:15px; }
  .option-desc{ font-size:12.5px; color:var(--muted); }

  .metrics-bar{
    position:sticky; top:0; z-index:40; background:rgba(11,17,32,0.85);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--border);
    padding:12px 20px; display:flex; gap:18px; flex-wrap:wrap; align-items:center; justify-content:space-between;
  }
  html.theme-orange .metrics-bar{ background:rgba(250,244,236,0.88); }
  html.theme-crimson .metrics-bar{ background:rgba(22,18,19,0.88); }
  html.theme-emerald .metrics-bar{ background:rgba(14,26,22,0.88); }
  .metrics-inner{ max-width:880px; margin:0 auto; width:100%; display:flex; gap:18px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
  .metric-group{ display:flex; gap:14px; flex-wrap:wrap; }
  .metric-mini{ display:flex; flex-direction:column; gap:3px; min-width:84px; }
  .metric-mini .lbl{ font-family:var(--font-mono); font-size:9px; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); }
  .metric-mini .track{ height:5px; border-radius:4px; background:var(--surface-2); overflow:hidden; border:1px solid var(--border); }
  .metric-mini .fill{ height:100%; border-radius:4px; transition:width .5s ease, background .3s ease; }
  .metric-mini .val{ font-family:var(--font-mono); font-size:10.5px; color:var(--text); }
  .brand-mini{ font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--accent); display:flex; align-items:center; gap:8px; }
  .glossary-btn{ font-family:var(--font-mono); font-size:11px; padding:6px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); cursor:pointer; }
  .glossary-btn:hover{ border-color:var(--accent); }

  .rail{ display:flex; gap:6px; margin:20px 0 28px; flex-wrap:wrap; }
  .rail-step{ font-family:var(--font-mono); font-size:10px; letter-spacing:0.05em; padding:5px 10px; border-radius:20px; border:1px solid var(--border); color:var(--muted); background:var(--surface); }
  .rail-step.active{ background:var(--accent); color:var(--accent-contrast); border-color:var(--accent); font-weight:600; }
  .rail-step.done{ color:var(--accent); border-color:rgba(var(--accent-rgb),0.35); background:rgba(var(--accent-rgb),0.06); }

  .chunk{ cursor:pointer; padding:2px 3px; border-radius:4px; border-bottom:2px dotted var(--border); transition:all .15s ease; }
  .chunk:hover{ background:var(--surface-2); }
  .chunk.picked{ background:rgba(var(--accent-rgb),0.22); border-bottom-color:var(--accent); }
  .chunk.reveal-hit{ background:var(--good-dim); border-bottom:2px solid var(--good); }
  .chunk.reveal-miss{ background:var(--bad-dim); border-bottom:2px solid var(--bad); text-decoration:none; }

  .source-line{ font-family:var(--font-mono); font-size:11.5px; color:var(--muted); margin-bottom:14px; display:flex; gap:10px; flex-wrap:wrap; }
  .headline-box{ font-family:var(--font-display); font-size:clamp(20px,3.4vw,27px); font-weight:700; line-height:1.35; margin-bottom:16px; }
  .article-box{ font-size:15px; color:var(--text); line-height:1.7; padding:14px 16px; background:var(--surface-2); border-radius:10px; border:1px solid var(--border); }
  .post-box{ font-size:16px; color:var(--text); line-height:1.75; padding:18px 20px; background:var(--surface-2); border-radius:12px; border:1px solid var(--border); font-style:italic; }

  .score-hero{ display:flex; align-items:baseline; gap:12px; margin:6px 0 18px; }
  .score-hero .num{ font-family:var(--font-display); font-size:52px; font-weight:700; color:var(--accent); }
  .score-hero .lbl{ font-family:var(--font-mono); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); }

  .callout{ margin:18px 0; padding:16px 18px; border-radius:12px; background:var(--surface-2); border:1px solid var(--border); }
  .callout.gold{ border-color:rgba(var(--accent-rgb),0.4); background:rgba(var(--accent-rgb),0.06); }

  textarea{
    width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-family:var(--font-body); font-size:14.5px; padding:14px; outline:none; resize:vertical; min-height:120px;
  }
  textarea:focus{ border-color:var(--accent); }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(2px); z-index:80; display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto; }
  .modal{ background:var(--surface); border:1px solid var(--border); border-radius:16px; max-width:640px; width:100%; padding:26px; margin-top:20px; }
  .glossary-item{ padding:14px 0; border-bottom:1px solid var(--border); }
  .glossary-item:last-child{ border-bottom:none; }
  .glossary-item h3{ font-size:15.5px; margin-bottom:6px; }
  .glossary-item .eth{ font-size:12.5px; color:var(--good); margin-top:6px; }

  .footer-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:26px; gap:12px; flex-wrap:wrap; }
  .theme-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .theme-swatch{ display:flex; align-items:center; gap:6px; padding:8px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface); cursor:pointer; font-family:var(--font-mono); font-size:11px; color:var(--muted); }
  .theme-swatch.active{ border-color:var(--accent); color:var(--text); }
  .swatch-dot{ width:10px; height:10px; border-radius:50%; }

  .dashboard-grid{ display:grid; gap:16px; grid-template-columns:1fr; }
  @media (min-width:640px){ .dashboard-grid{ grid-template-columns:1fr 1fr; } }
  .db-card h3{ font-size:14px; color:var(--accent); margin-bottom:8px; }
  .habit-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:8px; }
  .habit-list li{ background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:13.5px; color:var(--text); display:flex; gap:8px; }
  .habit-list li .n{ color:var(--accent); font-family:var(--font-mono); flex-shrink:0; }

  .disclaimer{ font-size:12px; color:var(--muted); font-style:italic; margin-top:10px; }
</style>
</head>
<body>
<div id="metricsBar"></div>
<div class="shell" id="app"></div>
<div id="modalRoot"></div>

<script>
(function(){
"use strict";

/* ============================= DATA ============================= */

var HEADLINE_SCENARIOS = [
  {
    outlet:"The Daily Pulse", author:null, date:"Mar 3",
    headlineChunks:[
      {t:"SCIENTISTS CONFIRM ", m:true},{t:"Chocolate ", m:false},{t:"Cures ", m:true},
      {t:"Anxiety ", m:false},{t:"Overnight, ", m:true},{t:"Doctors Stunned", m:true}
    ],
    article:"A small university study found that 24 participants who ate dark chocolate daily for two weeks reported slightly lower self-reported stress scores on a survey. Researchers say more research is needed and caution against overinterpreting the results.",
    accuracyScore:22,
    sourceReliability:{level:"Low", reasoning:"No author listed, no link to the actual study, and the outlet has no visible track record.", redFlags:["No byline","No citation of the actual study","Sensational-sounding outlet name"]},
    explanation:"The word 'confirm' implies certainty science doesn't claim here, and 'cures' promises a medical outcome a two week self reported survey can't support. A study with 24 people is a starting point, not a confirmed cure.",
    rewrittenHeadline:"Small Study Finds Possible Link Between Dark Chocolate and Lower Reported Stress",
    keyTakeaway:"Words like 'confirm,' 'cures,' and 'stunned' usually mean a small, early finding is being sold as a settled fact."
  },
  {
    outlet:"MetroWire", author:"Staff Writer", date:"Jun 14",
    headlineChunks:[
      {t:"Local Restaurant ", m:false},{t:"EXPOSED ", m:true},{t:"for '", m:false},{t:"Disgusting", m:true},
      {t:"' Health Violation, Customers ", m:false},{t:"FURIOUS", m:true}
    ],
    article:"A city health inspection found one expired container of cream in a walk-in fridge during a routine visit. The restaurant corrected it on the spot and passed the inspection with a minor note. No illnesses have been reported.",
    accuracyScore:30,
    sourceReliability:{level:"Medium", reasoning:"Generic 'Staff Writer' byline, but the outlet name is plausible and it does reference an actual inspection.", redFlags:["Vague byline","No inspection report linked"]},
    explanation:"'Exposed' implies a coverup, but this was a routine inspection with a minor, corrected note. 'Furious customers' aren't quoted or shown anywhere in the article.",
    rewrittenHeadline:"Routine Health Inspection Finds Minor Issue, Restaurant Corrects It Immediately",
    keyTakeaway:"If a headline claims a strong public reaction but the article doesn't quote a single person feeling that way, the reaction was probably invented for the headline."
  },
  {
    outlet:"Finance Now Daily", author:null, date:"Jan 29",
    headlineChunks:[
      {t:"This ", m:false},{t:"ONE Habit ", m:true},{t:"Made Him a Millionaire by 25, ", m:false},
      {t:"Banks Don't Want You to Know", m:true}
    ],
    article:"A 25-year-old founder sold a small software tool he built for a niche hobby community for a reported $1.2 million. He credits saving diligently, consistent freelance work over four years, and one product that found the right audience at the right time.",
    accuracyScore:18,
    sourceReliability:{level:"Low", reasoning:"No byline, and the conspiratorial framing is a classic sign of content designed to sell something later on the page.", redFlags:["No byline","Conspiracy framing","No verification of the sale amount"]},
    explanation:"There's no single habit here, it's four years of consistent work plus timing. 'Banks don't want you to know' has nothing to do with the actual story, it's just an urgency device.",
    rewrittenHeadline:"How a 25-Year-Old Sold a Niche Software Tool for $1.2 Million After 4 Years of Work",
    keyTakeaway:"'They don't want you to know' almost never connects to the actual story. It's manufactured secrecy to make you feel like you're missing out."
  },
  {
    outlet:"The Wire Report", author:"J. Amadi", date:"Sep 2",
    headlineChunks:[
      {t:"New Traffic Law Could Get You ", m:false},{t:"ARRESTED ", m:true},{t:"for Common Mistake, ", m:false},
      {t:"Nobody is Talking About This", m:true}
    ],
    article:"A new city ordinance increases the fine for driving without a working rear light from 5,000 to 15,000 naira. Repeated violations within a year can result in a court summons, not automatic arrest. The change was covered by two other local outlets last week.",
    accuracyScore:35,
    sourceReliability:{level:"Medium", reasoning:"Named author and a real-sounding ordinance detail, but 'nobody is talking about this' is false, it was already covered elsewhere.", redFlags:["False novelty claim"]},
    explanation:"The actual consequence is an increased fine, and only repeat violations risk a court summons, not arrest. 'Nobody is talking about this' is also untrue, other outlets already covered it.",
    rewrittenHeadline:"City Increases Fine for Driving Without a Rear Light, Repeat Offenders May Face Court",
    keyTakeaway:"'Nobody is talking about this' is a manufactured urgency phrase. If it were actually true, it'd be less newsworthy, not more."
  },
  {
    outlet:"PulseCulture", author:null, date:"Nov 11",
    headlineChunks:[
      {t:"Fans ", m:false},{t:"DEVASTATED ", m:true},{t:"as Beloved Show ", m:false},
      {t:"CANCELLED Forever, ", m:true},{t:"Network Silent", m:true}
    ],
    article:"The streaming platform announced the show will end after its already-planned fifth and final season, consistent with what the creators said in an interview eight months ago. The network released a statement thanking the cast and crew.",
    accuracyScore:20,
    sourceReliability:{level:"Low", reasoning:"No byline, and the claim that the network is 'silent' is contradicted by the article's own second sentence.", redFlags:["No byline","Headline contradicts its own article"]},
    explanation:"This is a planned ending announced months in advance, not a surprise cancellation. And the network did release a statement, so it isn't 'silent,' the headline and the article disagree with each other.",
    rewrittenHeadline:"Streaming Show Ends After Planned Fifth Season, As Creators Announced Months Ago",
    keyTakeaway:"Watch for headlines contradicted by their own article. It's a sign the headline was written for clicks, not to summarize the piece."
  },
  {
    outlet:"GreenLeaf Health Journal", author:"R. Osei", date:"Apr 20",
    headlineChunks:[
      {t:"Doctors ", m:false},{t:"BAFFLED ", m:true},{t:"as Common Fruit Found to '", m:false},
      {t:"Reverse Aging", m:true},{t:"' in New Study", m:false}
    ],
    article:"A lab study observed that an antioxidant compound found in blueberries slowed cell aging markers in a petri dish, not in living humans. Researchers explicitly stated that human trials have not been conducted and that results in isolated cells often don't translate to the body.",
    accuracyScore:15,
    sourceReliability:{level:"Medium", reasoning:"Named author and plausible outlet, but the headline claims a human effect the study never tested.", redFlags:["Headline claim not tested in the actual study"]},
    explanation:"The study never tested this in a living person, only in isolated cells in a lab dish. 'Reverse aging' is a claim about your body; the study is about cells in a petri dish. Those are different things.",
    rewrittenHeadline:"Lab Study Finds Blueberry Compound Slows Cell Aging Markers, Human Effects Not Yet Tested",
    keyTakeaway:"'In a lab' and 'in your body' are not the same claim. A lot of health headlines quietly skip that difference."
  }
];

var EMOTION_SCENARIOS = [
  {
    platform:"Instagram Reel caption",
    contentChunks:[
      {t:"POV: you find out ", m:false},{t:"everyone around you has been lying to you", m:true},{t:" this whole time 😭 I can't believe I trusted them. If you've ever felt ", m:false},
      {t:"betrayed", m:true},{t:" by people closest to you, you ", m:false},{t:"NEED to see this", m:true},
      {t:". Save this ", m:false},{t:"before it gets taken down", m:true},{t:".", m:false}
    ],
    audienceOptions:["People who feel isolated or recently hurt by friends or family","Parents of young children","People shopping for home insurance","Retirees planning travel"],
    targetAudience:"People who feel isolated or recently hurt by friends or family",
    intendedEmotion:"Betrayal and urgency",
    techniqueId:"fear_of_missing_out_scarcity",
    neutralRewrite:"Sharing something that helped me process a falling out with people close to me. Save it if it's useful.",
    keyTakeaway:"Vague claims of betrayal paired with fake urgency are designed to make you act on emotion before you think.",
    marketingCallback:"This is the same emotional pull a 'conversion' pillar might reach for. The honest version keeps the feeling but drops the fake urgency and the vague accusation."
  },
  {
    platform:"X (Twitter) post",
    contentChunks:[
      {t:"They ", m:false},{t:"RAISED", m:false},{t:" the price again and ", m:false},{t:"nobody is saying anything", m:true},
      {t:". This is exactly how ", m:false},{t:"they get away with it every single time", m:true},
      {t:". ", m:false},{t:"Wake up", m:true},{t:".", m:false}
    ],
    audienceOptions:["People already frustrated with rising costs, looking for validation","New parents researching baby products","Students choosing a university","Small business accountants"],
    targetAudience:"People already frustrated with rising costs, looking for validation",
    intendedEmotion:"Anger and vindication",
    techniqueId:"vague_villain_outrage_bait",
    neutralRewrite:"Noticed a price increase again. Curious if others have seen the same and what the reasoning was.",
    keyTakeaway:"'They' with no name and 'every single time' with no examples is a combination built to generate anger, not information.",
    marketingCallback:"Outrage bait borrows the same emotional trigger a 'trends commentary' pillar uses to ride attention. The honest version raises the same question without inventing a villain."
  },
  {
    platform:"Facebook post",
    contentChunks:[
      {t:"My doctor ", m:false},{t:"didn't want me to share this", m:true},{t:" but I'm done staying quiet. This simple trick helped me lose 20kg without exercise and ", m:false},
      {t:"Big Pharma is NOT happy", m:true},{t:" about it. Comment 'ME' if you want the link ", m:false},
      {t:"before I take this down", m:true},{t:".", m:false}
    ],
    audienceOptions:["People looking for a fast, easy weight loss solution","Career changers considering tech","People planning a wedding","Landlords managing rental properties"],
    targetAudience:"People looking for a fast, easy weight loss solution",
    intendedEmotion:"Hope mixed with urgency and distrust of institutions",
    techniqueId:"authority_conspiracy_urgency",
    neutralRewrite:"Sharing something that worked for me with weight loss. Comment if you'd like the link.",
    keyTakeaway:"'They don't want you to know' plus a countdown to delete the post is almost always a sales funnel, not a genuine discovery.",
    marketingCallback:"This is the manipulative cousin of a real 'testimonials' pillar. An honest testimonial shares a result and lets you decide, it doesn't invent a secret or a countdown."
  },
  {
    platform:"TikTok caption",
    contentChunks:[
      {t:"Not me finding out THIS is why I've been broke my whole life 💀 ", m:false},
      {t:"they really kept this from us", m:true},{t:". ", m:false},{t:"Every single person needs to know this", m:true},
      {t:" ", m:false},{t:"before 2027", m:true},{t:".", m:false}
    ],
    audienceOptions:["Younger audiences anxious about their financial future","Retired homeowners","Pet owners","Long distance runners"],
    targetAudience:"Younger audiences anxious about their financial future",
    intendedEmotion:"Anxiety disguised as humor, then urgency",
    techniqueId:"false_universality_deadline",
    neutralRewrite:"Learned something recently about money management that I wish I'd known earlier.",
    keyTakeaway:"A funny, relatable opener is often just the entry point. Watch what happens right after the joke.",
    marketingCallback:"The humor-then-hook structure is a legitimate awareness tactic when used honestly. The manipulative version adds a fake deadline that has no real basis."
  },
  {
    platform:"Instagram carousel caption",
    contentChunks:[
      {t:"If you know, you know. The people who get this will get it, and the people who don't, ", m:false},
      {t:"weren't built for this level", m:true},{t:". Tag someone who's ", m:false},{t:"actually built different", m:true},{t:".", m:false}

/* ============================= HELPERS ============================= */

function pickNew(pool, used){
  if(used.length >= pool.length) used = [];
  var idx;
  do { idx = Math.floor(Math.random()*pool.length); } while(used.indexOf(idx)!==-1);
  used.push(idx);
  return {item:pool[idx], idx:idx, used:used};
}

function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

function scoreChunks(chunks, picked){
  var shouldPick=0, correctlyPicked=0, wronglyPicked=0;
  chunks.forEach(function(c,i){
    if(c.m){ shouldPick++; if(picked[i]) correctlyPicked++; }
    else { if(picked[i]) wronglyPicked++; }
  });
  var recall = shouldPick>0 ? correctlyPicked/shouldPick : 1;
  var penalty = wronglyPicked * 0.12;
  var score = clamp(Math.round((recall - penalty)*100), 5, 100);
  return score;
}

function glossaryEntryByTechnique(techId){
  var map = {
    fear_of_missing_out_scarcity:0, vague_villain_outrage_bait:1, authority_conspiracy_urgency:2,
    false_universality_deadline:3, ingroup_exclusivity_bait:4, manufactured_urgency_share_pressure:5
  };
  var i = map[techId];
  return i!==undefined ? GLOSSARY[i] : null;
}

function metricColor(v){
  if(v===null) return "var(--muted)";
  if(v>=70) return "var(--good)";
  if(v>=40) return "var(--warn)";
  return "var(--bad)";
}

function escapeHtml(s){

/* ============================= HEURISTIC ANALYZER (paste your own) ============================= */

function analyzeText(text){
  var flags=[]; var score=100;
  var capsMatches = text.match(/\b[A-Z]{4,}\b/g) || [];
  if(capsMatches.length){ score -= Math.min(30, capsMatches.length*10); flags.push({type:"Shouting (ALL CAPS)", detail:capsMatches.slice(0,4).join(", ")}); }

  var superlatives = ["shocking","breaking","you won't believe","secret","banned","exposed","miracle","instantly","never","always","destroys","stunned","furious","devastated","urgent","won't believe"];
  var lower = text.toLowerCase();
  var foundSuper = superlatives.filter(function(w){ return lower.indexOf(w)!==-1; });
  if(foundSuper.length){ score -= Math.min(30, foundSuper.length*10); flags.push({type:"Superlative / absolutist language", detail:foundSuper.join(", ")}); }

  var conspiracy = ["don't want you to know","they don't want","before it's too late","before it's taken down","big pharma","wake up","they're hiding"];
  var foundConsp = conspiracy.filter(function(w){ return lower.indexOf(w)!==-1; });
  if(foundConsp.length){ score -= Math.min(25, foundConsp.length*20); flags.push({type:"Conspiracy / secrecy framing", detail:foundConsp.join(", ")}); }

  var vagueSourcing = ["sources say","many believe","experts claim","studies show","people are saying"];
  var foundVague = vagueSourcing.filter(function(w){ return lower.indexOf(w)!==-1; });
  if(foundVague.length){ score -= Math.min(15, foundVague.length*15); flags.push({type:"Vague, unnamed sourcing", detail:foundVague.join(", ")}); }

  var punctMatches = text.match(/[!?]{2,}/g) || [];
  if(punctMatches.length){ score -= Math.min(15, punctMatches.length*8); flags.push({type:"Excessive punctuation", detail:punctMatches.slice(0,3).join(" ")}); }

  var hasNumberClaim = /\b\d{1,3}%|\b\d+x\b|\bmillion\b|\bthousands\b/i.test(text);
  var hasAttribution = /study|source|report|survey|data|research/i.test(text);
  if(hasNumberClaim && !hasAttribution){ score -= 12; flags.push({type:"Unattributed number or statistic", detail:"A number or scale claim with no named study, source, or report."}); }

  score = clamp(Math.round(score), 0, 100);
  return {score:score, flags:flags};
}

      '<textarea id="pasteInput" placeholder="Paste a headline, caption, or post here...">'+escapeHtml(STATE.pasteText)+'</textarea>'+
      '<button class="btn btn-primary" style="margin-top:12px;" data-action="analyze-paste">Analyze this text</button>'+
    '</div>'+
    (resultHtml ? '<div class="card fade-in" style="margin-top:16px;">'+resultHtml+'</div>' : '')+
    '<div class="footer-nav"><div></div><button class="btn btn-primary" data-action="goto" data-value="dashboard">See my Media Integrity Dashboard →</button></div>'+
  '</div>';
}

function renderDashboard(){
  var m = STATE.metrics;
  var overall = Math.round(((m.headlineAccuracy||0)+(m.sourceReliability||0)+(m.emotionalManipulation||0)+(m.audienceTargeting||0))/4);

  var lowestKey = Object.keys(m).reduce(function(a,b){ return (m[a]===null||m[b]<m[a]) ? b : a; });
  var lowestLabelMap = {headlineAccuracy:"spotting exaggerated headlines", sourceReliability:"judging source reliability", emotionalManipulation:"catching emotional manipulation", audienceTargeting:"identifying who content is really targeting"};
  var redFlag = "Your biggest blind spot this round was " + lowestLabelMap[lowestKey] + ". That's worth deliberately practicing next time you scroll.";

  var shuffledHabits = HABITS_POOL.slice().sort(function(){ return Math.random()-0.5; }).slice(0,3);
  var habitsHtml = shuffledHabits.map(function(h,i){ return '<li><span class="n">0'+(i+1)+'</span><span>'+h+'</span></li>'; }).join("");

  var learned = (STATE.h ? STATE.h.keyTakeaway : "") + " " + (STATE.e ? STATE.e.keyTakeaway : "");

  return '<div class="fade-in">'+
    '<div class="eyebrow">Final Report</div>'+
    '<h2 style="font-size:26px; margin-bottom:14px;">Media Integrity Dashboard</h2>'+
    '<div class="score-hero"><div class="num">'+overall+'</div><div class="lbl">/ 100 overall media integrity score</div></div>'+
    '<div class="dashboard-grid">'+
      '<div class="db-card card"><h3>What you learned</h3><p style="color:var(--text); font-size:13.5px;">'+learned+'</p></div>'+
      '<div class="db-card card"><h3>Biggest red flag</h3><p style="color:var(--text); font-size:13.5px;">'+redFlag+'</p></div>'+
    '</div>'+
    '<div class="card" style="margin-top:16px;"><h3 style="font-size:14px; color:var(--accent); margin-bottom:10px;">Three habits to take with you</h3><ul class="habit-list">'+habitsHtml+'</ul></div>'+
    '<div class="footer-nav"><div></div><button class="btn btn-primary" data-action="replay">🔁 Replay with new scenarios</button></div>'+
  '</div>';
}

/* ============================= MODAL: GLOSSARY ============================= */

function renderGlossaryModal(){
  if(!STATE.glossaryOpen){ document.getElementById("modalRoot").innerHTML = ""; return; }
  var items = GLOSSARY.map(function(g){
    return '<div class="glossary-item"><h3>'+g.name+'</h3><p style="font-size:13px;">'+g.desc+'</p><p class="eth"><b>Ethical version:</b> '+g.eth+'</p></div>';
  }).join("");
  var html = '<div class="modal-backdrop" data-action="close-glossary">'+
    '<div class="modal" onclick="event.stopPropagation()">'+
      '<div class="eyebrow" style="margin-bottom:10px;">Manipulation Technique Glossary</div>'+
      items+
      '<button class="btn btn-primary btn-block" style="margin-top:16px;" data-action="close-glossary">Close</button>'+
    '</div>'+
  '</div>';
  document.getElementById("modalRoot").innerHTML = html;
}

/* ============================= MAIN RENDER ============================= */

function render(){
  document.documentElement.className = "theme-" + STATE.theme;
  renderMetricsBar();
  var app = document.getElementById("app");
  switch(STATE.screen){
    case "welcome": app.innerHTML = renderWelcome(); break;
    case "concept1": app.innerHTML = renderConcept1(); break;
    case "challenge1": app.innerHTML = renderChallenge1(); break;
    case "reveal1": app.innerHTML = renderReveal1(); break;
    case "concept2": app.innerHTML = renderConcept2(); break;
    case "challenge2": app.innerHTML = renderChallenge2(); break;
    case "reveal2": app.innerHTML = renderReveal2(); break;
    case "pasteown": app.innerHTML = renderPasteOwn(); break;
    case "dashboard": app.innerHTML = renderDashboard(); break;
    default: app.innerHTML = renderWelcome();
  }
  renderGlossaryModal();
}

/* ============================= ACTIONS ============================= */

function handleAction(action, value){
  if(action==="set-theme"){ STATE.theme = value; render(); return; }
  if(action==="toggle-glossary"){ STATE.glossaryOpen = !STATE.glossaryOpen; renderGlossaryModal(); return; }
  if(action==="close-glossary"){ STATE.glossaryOpen = false; renderGlossaryModal(); return; }

  if(action==="goto"){
    if(value==="challenge1" && !STATE.h){
      var picked = pickNew(HEADLINE_SCENARIOS, STATE.usedH);
      STATE.h = picked.item; STATE.usedH = picked.used;
      STATE.c1 = {click:null, reliability:null, picked:{}, submitted:false};
    }
    if(value==="challenge2" && (!STATE.e || STATE.screen==="concept2")){
      var pickedE = pickNew(EMOTION_SCENARIOS, STATE.usedE);
      STATE.e = pickedE.item; STATE.usedE = pickedE.used;
      STATE.c2 = {feeling:null, audience:null, picked:{}, submitted:false};
    }
    STATE.screen = value; render(); return;
  }

  if(action==="set-click"){ STATE.c1.click = value; render(); return; }
  if(action==="set-reliability"){ STATE.c1.reliability = value; render(); return; }
  if(action==="toggle-chunk-h"){
    var i = value;
    STATE.c1.picked[i] = !STATE.c1.picked[i];
    render(); return;
  }
  if(action==="submit-c1"){
    var h = STATE.h;
    var headlineScore = scoreChunks(h.headlineChunks, STATE.c1.picked);
    var relMatch = STATE.c1.reliability === h.sourceReliability.level;
    var relScore = relMatch ? 90 : (STATE.c1.reliability ? 45 : 20);
    STATE.metrics.headlineAccuracy = headlineScore;
    STATE.metrics.sourceReliability = relScore;
    STATE.screen = "reveal1"; render(); return;
  }

  if(action==="set-feeling"){ STATE.c2.feeling = value; render(); return; }
  if(action==="set-audience"){ STATE.c2.audience = value; render(); return; }
  if(action==="toggle-chunk-e"){
    var j = value;
    STATE.c2.picked[j] = !STATE.c2.picked[j];
    render(); return;
  }
  if(action==="submit-c2"){
    var e = STATE.e;
    var emoScore = scoreChunks(e.contentChunks, STATE.c2.picked);
    var audMatch = STATE.c2.audience === e.targetAudience;
    var audScore = audMatch ? 90 : 40;
    STATE.metrics.emotionalManipulation = emoScore;
    STATE.metrics.audienceTargeting = audScore;
    STATE.screen = "reveal2"; render(); return;
  }

  if(action==="analyze-paste"){
    var ta = document.getElementById("pasteInput");
    var text = ta ? ta.value : "";
    STATE.pasteText = text;
    STATE.pasteResult = text.trim().length ? analyzeText(text) : {score:100, flags:[]};
    render(); return;
  }

  if(action==="replay"){
    STATE.screen = "welcome";
    STATE.h = null; STATE.e = null;
    STATE.c1 = {click:null, reliability:null, picked:{}, submitted:false};
    STATE.c2 = {feeling:null, audience:null, picked:{}, submitted:false};
    STATE.metrics = {headlineAccuracy:null, sourceReliability:null, emotionalManipulation:null, audienceTargeting:null};
    STATE.pasteText = ""; STATE.pasteResult = null;
    render(); return;
  }
}

document.addEventListener("click", function(ev){
  var el = ev.target.closest ? ev.target.closest("[data-action]") : null;
  if(!el) return;
  var action = el.getAttribute("data-action");
  var value = el.getAttribute("data-value");
  handleAction(action, value);
});

render();

})();
</script>
</body>
</html>
