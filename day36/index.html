<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cognitive Pattern Explorer</title>
<style>
  :root{
    --bg:#F3F5F0;
    --bg-soft:#EAEEE8;
    --sage:#7C9A80;
    --sage-deep:#54725A;
    --lavender:#A9A2C9;
    --plum:#7C6B94;
    --gold:#CE9C5C;
    --ink:#33372F;
    --ink-soft:#6C7268;
    --card:#FFFFFF;
    --card-glass:rgba(255,255,255,0.72);
    --line:#DDE2D9;
    --radius-lg:22px;
    --radius-md:14px;
    --shadow:0 14px 40px -12px rgba(60,70,55,0.18);
    --shadow-sm:0 4px 14px -6px rgba(60,70,55,0.14);
    --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --dur:0.5s;
    --ease:cubic-bezier(.22,.7,.3,1);
  }
  [data-mode="stress"]{
    --bg:#F5F1EA;
    --bg-soft:#EFE8DC;
    --gold:#C98A4B;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    transition:background var(--dur) var(--ease);
  }
  .sr-only{
    position:absolute; width:1px; height:1px; padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
  }
  a,button{font-family:inherit;}
  button{cursor:pointer;}
  :focus-visible{
    outline:2.5px solid var(--sage-deep);
    outline-offset:3px;
    border-radius:6px;
  }

  /* ---------- Ambient background ---------- */
  #ambient{
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  }
  .blob{
    position:absolute; border-radius:50%; filter:blur(60px); opacity:0.5;
    will-change:transform;
  }
  .blob.b1{ width:46vw; height:46vw; top:-14vw; left:-10vw;
    background:radial-gradient(circle at 30% 30%, var(--sage), transparent 70%);
    animation:drift1 34s ease-in-out infinite;
  }
  .blob.b2{ width:38vw; height:38vw; bottom:-12vw; right:-8vw;
    background:radial-gradient(circle at 60% 40%, var(--lavender), transparent 70%);
    animation:drift2 40s ease-in-out infinite;
  }
  .blob.b3{ width:30vw; height:30vw; top:40%; left:60%;
    background:radial-gradient(circle at 50% 50%, var(--plum), transparent 72%);
    opacity:0.3;
    animation:drift3 46s ease-in-out infinite;
  }
  @keyframes drift1{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(4vw,3vw) scale(1.08); }
  }
  @keyframes drift2{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-3vw,-4vw) scale(1.1); }
  }
  @keyframes drift3{
    0%,100%{ transform:translate(0,0) scale(1) rotate(0deg); }
    50%{ transform:translate(-2vw,2vw) scale(0.94) rotate(8deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .blob{ animation:none !important; }
  }

  /* ---------- App shell ---------- */
  #app{
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column;
    align-items:center;
    padding:clamp(20px,4vw,48px) clamp(16px,5vw,24px) 60px;
  }

  /* ---------- Progress thread ---------- */
  #thread-wrap{
    width:100%; max-width:560px; margin:0 auto clamp(28px,5vw,44px);
  }
  #thread-wrap svg{ width:100%; height:auto; display:block; overflow:visible; }
  .thread-track{ stroke:var(--line); stroke-width:2.5; fill:none; }
  .thread-fill{
    stroke:var(--sage-deep); stroke-width:2.5; fill:none;
    stroke-linecap:round;
    transition:stroke-dashoffset 0.7s var(--ease);
  }
  .thread-node{ fill:var(--bg); stroke:var(--line); stroke-width:2; transition:all .4s var(--ease); }
  .thread-node.done{ fill:var(--sage-deep); stroke:var(--sage-deep); }
  .thread-node.current{ fill:var(--gold); stroke:var(--gold); }
  .thread-node.current.pulse{ animation:pulseNode 2.4s ease-in-out infinite; }
  @keyframes pulseNode{
    0%,100%{ r:6.5; opacity:1; }
    50%{ r:8.5; opacity:0.75; }
  }
  @media (prefers-reduced-motion: reduce){ .thread-node.pulse{ animation:none; } }
  .thread-labels{
    display:flex; justify-content:space-between; margin-top:6px;
    font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:var(--ink-soft);
  }

  /* ---------- Screens ---------- */
  .screen{
    width:100%; max-width:640px;
    opacity:0; transform:translateY(10px);
    transition:opacity var(--dur) var(--ease), transform var(--dur) var(--ease);
  }
  .screen.active{ opacity:1; transform:none; }
  @media (prefers-reduced-motion: reduce){
    .screen{ transition:opacity .25s linear; transform:none; }
  }

  h1,h2,h3{ font-family:var(--font-display); font-weight:400; margin:0 0 10px; color:var(--ink); }
  h1{ font-size:clamp(28px,5vw,40px); line-height:1.15; }
  h2{ font-size:clamp(21px,3.4vw,26px); line-height:1.3; }
  h3{ font-size:17px; }
  p{ line-height:1.6; color:var(--ink-soft); margin:0 0 14px; }
  .eyebrow{
    font-size:12px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--sage-deep); font-weight:600; margin-bottom:10px; display:block;
  }

  /* ---------- Cards / panels ---------- */
  .panel{
    background:var(--card-glass);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.6);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:clamp(22px,4.5vw,40px);
  }

  /* ---------- Start screen ---------- */
  #start-screen{ text-align:center; }
  .start-hero{ margin-bottom:28px; }
  .mode-toggle{
    display:inline-flex; background:var(--bg-soft); border-radius:999px; padding:4px;
    margin:18px 0 26px; gap:2px;
  }
  .mode-toggle button{
    border:none; background:transparent; padding:9px 20px; border-radius:999px;
    font-size:14px; color:var(--ink-soft); transition:all .3s var(--ease);
  }
  .mode-toggle button[aria-pressed="true"]{
    background:var(--card); color:var(--ink); box-shadow:var(--shadow-sm); font-weight:600;
  }
  .disclaimer{
    font-size:12.5px; color:var(--ink-soft); max-width:420px; margin:0 auto 26px;
    line-height:1.55;
  }
  .btn-primary{
    background:var(--sage-deep); color:#fff; border:none; border-radius:999px;
    padding:14px 34px; font-size:15.5px; font-weight:600; letter-spacing:0.01em;
    box-shadow:var(--shadow-sm); transition:transform .25s var(--ease), box-shadow .25s var(--ease);
  }
  .btn-primary:hover{ transform:translateY(-2px); box-shadow:var(--shadow); }
  .btn-secondary{
    background:transparent; color:var(--ink-soft); border:1.5px solid var(--line);
    border-radius:999px; padding:12px 26px; font-size:14.5px; font-weight:500;
    transition:all .25s var(--ease);
  }
  .btn-secondary:hover{ border-color:var(--sage-deep); color:var(--sage-deep); }
  .btn-row{ display:flex; gap:12px; justify-content:center; margin-top:26px; flex-wrap:wrap; }

  /* ---------- Chapter 1: scenarios ---------- */
  .scenario-count{ font-size:13px; color:var(--ink-soft); margin-bottom:4px; }
  .options{ display:flex; flex-direction:column; gap:10px; margin-top:22px; }
  .option-btn{
    text-align:left; background:var(--card); border:1.5px solid var(--line);
    border-radius:var(--radius-md); padding:15px 18px; font-size:15px; color:var(--ink);
    line-height:1.5; transition:all .25s var(--ease);
  }
  .option-btn:hover{ border-color:var(--sage); transform:translateX(2px); }
  .option-btn[aria-pressed="true"]{
    border-color:var(--sage-deep); background:linear-gradient(0deg, rgba(124,154,128,0.10), rgba(124,154,128,0.10)), var(--card);
    box-shadow:0 0 0 1px var(--sage-deep) inset;
  }
  .chapter-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:30px; gap:12px; }
  .chapter-hint{ font-size:13px; color:var(--ink-soft); }

  /* ---------- Draggable list (chapters 2 & 3) ---------- */
  .drag-list{ list-style:none; margin:22px 0 0; padding:0; display:flex; flex-direction:column; gap:10px; }
  .drag-item{
    display:flex; align-items:center; gap:12px;
    background:var(--card); border:1.5px solid var(--line); border-radius:var(--radius-md);
    padding:13px 14px; transition:box-shadow .25s var(--ease), transform .18s var(--ease), border-color .25s var(--ease);
  }
  .drag-item.dragging{ opacity:0.5; }
  .drag-item.drag-over{ border-color:var(--sage-deep); box-shadow:0 0 0 2px rgba(84,114,90,0.18) inset; }
  .drag-rank{
    font-family:var(--font-mono); font-size:13px; color:var(--sage-deep); font-weight:700;
    width:22px; text-align:center; flex-shrink:0;
  }
  .drag-handle{
    cursor:grab; padding:6px; color:var(--ink-soft); flex-shrink:0; touch-action:none;
    display:flex; align-items:center; border-radius:8px;
  }
  .drag-handle:active{ cursor:grabbing; }
  .drag-body{ flex:1; min-width:0; }
  .drag-body strong{ display:block; font-size:15px; color:var(--ink); font-weight:600; }
  .drag-body span{ display:block; font-size:12.5px; color:var(--ink-soft); margin-top:1px; }
  .drag-buttons{ display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
  .drag-buttons button{
    background:var(--bg-soft); border:none; border-radius:6px; width:26px; height:22px;
    font-size:11px; color:var(--ink-soft); line-height:1; transition:background .2s;
  }
  .drag-buttons button:hover:not(:disabled){ background:var(--sage); color:#fff; }
  .drag-buttons button:disabled{ opacity:0.3; cursor:default; }

  /* ---------- Journal / results ---------- */
  .bar-row{ margin-bottom:16px; }
  .bar-row-top{ display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:6px; }
  .bar-row-top strong{ color:var(--ink); font-weight:600; }
  .bar-row-top span{ font-family:var(--font-mono); color:var(--ink-soft); }
  .bar-track{ background:var(--bg-soft); border-radius:999px; height:10px; overflow:hidden; }
  .bar-fill{
    height:100%; border-radius:999px; width:0%;
    transition:width 1s var(--ease);
  }
  .reflection-block{
    margin-top:26px; padding:20px 22px; background:var(--bg-soft); border-radius:var(--radius-md);
    border-left:3px solid var(--sage-deep);
  }
  .reflection-block p{ color:var(--ink); margin-bottom:0; }
  .ai-tag{
    display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600;
    color:var(--sage-deep); letter-spacing:0.03em; text-transform:uppercase; margin-bottom:10px;
  }
  .ai-loading{ font-size:13px; color:var(--ink-soft); display:flex; align-items:center; gap:8px; margin-top:26px; }
  .spinner{
    width:14px; height:14px; border-radius:50%;
    border:2px solid var(--line); border-top-color:var(--sage-deep);
    animation:spin 0.9s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .spinner{ animation:spin 1.6s linear infinite; } }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .journal-map{ margin:26px 0; text-align:center; }
  .journal-map svg{ width:100%; max-width:420px; height:auto; }

  .export-row{ display:flex; gap:12px; justify-content:center; margin-top:30px; flex-wrap:wrap; }

  footer.credits{
    margin-top:40px; text-align:center; font-size:12px; color:var(--ink-soft); opacity:0.7;
  }

  @media (max-width:480px){
    .btn-row, .export-row{ flex-direction:column; align-items:stretch; }
    .chapter-nav{ flex-direction:column-reverse; align-items:stretch; }
    .chapter-nav .btn-primary, .chapter-nav .btn-secondary{ width:100%; text-align:center; }
  }
</style>
</head>
<body data-mode="calm">

<div id="ambient" aria-hidden="true">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div id="live-region" class="sr-only" aria-live="polite"></div>

<main id="app">
  <div id="thread-wrap"></div>
  <div id="screen-host"></div>
</main>

<script>
(function(){
  "use strict";

  /* =========================================================
     DATA
  ========================================================= */
  var TENDENCIES = ["analytical","emotional","overthinking","action","balanced"];

  var TENDENCY_META = {
    analytical:   { name:"Analytical Thinker",          color:"#54725A",
      blurb:"You tend to reach for logic first. When something happens, you often look for the structure underneath it before deciding how to feel about it. That can be a steady anchor \u2014 just worth remembering that not everything needs to be fully solved to be understood." },
    emotional:    { name:"Emotional Intuitive",          color:"#7C6B94",
      blurb:"Your feelings tend to arrive early and clearly. You often trust what you sense in a moment more than what you could prove on paper. That instinct can be a real strength, especially when paired with a little patience before acting on it." },
    overthinking: { name:"Overthinking Loop Style",      color:"#A9A2C9",
      blurb:"You often find yourself circling back to a moment, turning it over more than once. This suggests you care deeply about getting things right, even when it costs you some peace along the way. Noticing the loop is usually the first step toward loosening it." },
    action:       { name:"Action-First Decision Maker",  color:"#CE9C5C",
      blurb:"You tend to move first and adjust as you go. Momentum often feels safer to you than sitting with uncertainty. That's a real strength \u2014 just occasionally worth a pause to check the direction, not just the speed." },
    balanced:     { name:"Balanced Reflective Thinker",  color:"#7C9A80",
      blurb:"You often hold logic and feeling at once, letting each inform the other. This suggests a natural steadiness \u2014 you tend to neither rush nor freeze, but move once things feel considered. That's a quietly rare way to meet the world." }
  };

  // A broad pool of scenarios across categories \u2014 five are randomly drawn
  // each session (see pickSessionScenarios) so the experience varies on replay.
  var SCENARIO_POOL = [
    { id:"plans", category:"friendship",
      calm:"A friend cancels plans on you last minute, no real explanation given. What happens in your head first?",
      stress:"You're already stretched thin and a friend cancels last minute with no explanation. What's your very first instinct?",
      options:[
        { t:"analytical", text:"I quietly run through the likely reasons and land on the most probable one." },
        { t:"emotional", text:"A small sting of hurt shows up before any thoughts do." },
        { t:"overthinking", text:"I reread the message a few times, turning it over for hidden meaning." },
        { t:"action", text:"I say \u201call good\u201d and immediately fill the slot with something else." },
        { t:"balanced", text:"I notice the disappointment, let it pass, and check in with them later." }
      ]
    },
    { id:"purchase", category:"money",
      calm:"You're about to make a big purchase, something you've been saving up for. How do you actually decide?",
      stress:"Money's tight and you need to make a big purchase decision fast. What do you lean on?",
      options:[
        { t:"analytical", text:"Spreadsheets, comparisons, reviews. I want the numbers to make the call." },
        { t:"emotional", text:"I picture how each option makes me feel and go from there." },
        { t:"overthinking", text:"I open forty tabs and still can't fully settle on one." },
        { t:"action", text:"I pick something solid enough and order it before I can second-guess." },
        { t:"balanced", text:"I do a bit of research, then trust the option that sits well with me." }
      ]
    },
    { id:"feedback", category:"work",
      calm:"Someone gives you feedback that's a little vague \u2014 you're not fully sure what they meant. What's your move?",
      stress:"You get vague feedback right when you're already under pressure. What's your move?",
      options:[
        { t:"analytical", text:"I ask a direct follow-up question to pin down exactly what they meant." },
        { t:"emotional", text:"I feel it in my chest before I've even processed the words." },
        { t:"overthinking", text:"I turn the sentence over for hours, drafting replies I never send." },
        { t:"action", text:"I take my best guess at what they meant and adjust as I go." },
        { t:"balanced", text:"I sit with it a bit, then ask a calm clarifying question when I'm ready." }
      ]
    },
    { id:"conflict", category:"connection",
      calm:"You're in a small disagreement with someone you care about. What do you notice about yourself?",
      stress:"Tensions are already high, and a disagreement breaks out with someone you care about. What do you notice?",
      options:[
        { t:"analytical", text:"I try to lay out both sides clearly, like solving a puzzle." },
        { t:"emotional", text:"My emotions arrive fast, sometimes before I've even said a word." },
        { t:"overthinking", text:"I keep rehearsing the conversation afterward, wishing I'd said it differently." },
        { t:"action", text:"I want to resolve it right away, even imperfectly, rather than let it sit." },
        { t:"balanced", text:"I try to hear them out fully before deciding how I feel about it." }
      ]
    },
    { id:"change", category:"unexpected",
      calm:"Plans you were genuinely looking forward to suddenly fall through. What's your honest first reaction?",
      stress:"Right when you needed things to go smoothly, plans fall through. What's your honest first reaction?",
      options:[
        { t:"analytical", text:"I start problem-solving, looking for the next best option." },
        { t:"emotional", text:"Disappointment shows up fast and fully before anything else." },
        { t:"overthinking", text:"I keep replaying what I could have done to prevent it." },
        { t:"action", text:"I pivot almost immediately and move on to whatever's next." },
        { t:"balanced", text:"I let myself feel let down, then look for what's still possible." }
      ]
    },
    { id:"crush", category:"romance",
      calm:"You send a message to someone you like, and the reply takes longer than usual to come. What's going on in your head while you wait?",
      stress:"You're already anxious about other things, and now a message to someone you like is taking longer than usual to get a reply. What's going on in your head?",
      options:[
        { t:"analytical", text:"I remind myself people get busy, and a delay usually just means a delay." },
        { t:"emotional", text:"I feel the uncertainty in my body before I can talk myself out of it." },
        { t:"overthinking", text:"I reread my message, wondering if I said something wrong." },
        { t:"action", text:"I stop watching my phone and just go do something else." },
        { t:"balanced", text:"I notice I'm anxious, name it to myself, and try to let the moment pass." }
      ]
    },
    { id:"relationship_change", category:"romance",
      calm:"Someone you're dating gently brings up wanting more time together. How do you first respond, even just internally?",
      stress:"Right when things feel busy and full already, someone you're dating brings up wanting more time together. How do you first respond internally?",
      options:[
        { t:"analytical", text:"I start thinking through my schedule and what's realistically possible." },
        { t:"emotional", text:"I feel a rush of warmth, or maybe pressure, before I've thought anything through." },
        { t:"overthinking", text:"I start wondering what this means for the relationship, replaying the conversation." },
        { t:"action", text:"I suggest a plan on the spot, right there in the moment." },
        { t:"balanced", text:"I sit with what they said, then respond once I've actually checked in with myself." }
      ]
    },
    { id:"heartbreak", category:"romance",
      calm:"A relationship that mattered to you has recently ended. What do you notice yourself doing most, early on?",
      stress:"Right when everything else already feels like a lot, a relationship that mattered to you has ended. What do you notice yourself doing most?",
      options:[
        { t:"analytical", text:"I try to understand what happened, almost like reviewing the timeline." },
        { t:"emotional", text:"I feel it fully, in waves, before I try to make sense of any of it." },
        { t:"overthinking", text:"I replay specific conversations, looking for the exact moment it started to shift." },
        { t:"action", text:"I keep busy, filling my days so there's less room to sit with it." },
        { t:"balanced", text:"I let myself feel it, and also start slowly making space for what's next." }
      ]
    },
    { id:"family_comment", category:"family",
      calm:"A family member makes an offhand comment about your life choices at a gathering. What's your first internal move?",
      stress:"You're already tired, and a family member makes an offhand comment about your life choices. What's your first internal move?",
      options:[
        { t:"analytical", text:"I consider where they're coming from before deciding how much weight to give it." },
        { t:"emotional", text:"I feel it land, whether I show it or not." },
        { t:"overthinking", text:"I keep coming back to the comment for the rest of the day." },
        { t:"action", text:"I brush it off with a quick reply and move the conversation along." },
        { t:"balanced", text:"I notice the sting, decide it's not worth much, and let it go." }
      ]
    },
    { id:"comparison", category:"friendship",
      calm:"A friend shares an exciting update about something you've also been hoping for. What happens in you first?",
      stress:"You're already feeling behind, and a friend shares an exciting update about something you've also been hoping for. What happens in you first?",
      options:[
        { t:"analytical", text:"I think about what steps they took and what I might learn from it." },
        { t:"emotional", text:"A mix of happiness for them and a pinch of something else shows up at once." },
        { t:"overthinking", text:"I start comparing our timelines and wondering what I'm doing wrong." },
        { t:"action", text:"I congratulate them and turn my attention back to my own next step." },
        { t:"balanced", text:"I let myself feel both the happiness and the twinge, without picking just one." }
      ]
    },
    { id:"opportunity", category:"opportunity",
      calm:"An unexpected opportunity lands in your inbox, exciting but with a tight deadline to respond. What's your process?",
      stress:"In the middle of an already full week, an unexpected opportunity lands with a tight deadline. What's your process?",
      options:[
        { t:"analytical", text:"I map out the pros and cons before I let myself get excited." },
        { t:"emotional", text:"My gut reaction, excited or hesitant, shows up almost instantly." },
        { t:"overthinking", text:"I keep drafting different versions of a reply, unsure which one is right." },
        { t:"action", text:"I reply quickly, trusting I can work out details later." },
        { t:"balanced", text:"I feel the excitement, then take a beat to check if it's actually right for me." }
      ]
    },
    { id:"mistake", category:"work",
      calm:"You realize you've made a small but real mistake in something you were responsible for. What's your first instinct?",
      stress:"In the middle of a stressful stretch, you realize you've made a real mistake in something you were responsible for. What's your first instinct?",
      options:[
        { t:"analytical", text:"I figure out exactly what went wrong and how to fix it." },
        { t:"emotional", text:"A wave of embarrassment or worry hits before I do anything else." },
        { t:"overthinking", text:"I keep replaying how it happened, even after it's already handled." },
        { t:"action", text:"I fix what I can immediately and let people know without delay." },
        { t:"balanced", text:"I acknowledge it, take a breath, and then move into fixing it." }
      ]
    },
    { id:"support", category:"connection",
      calm:"Someone close to you is going through a hard time and turns to you for support. What do you naturally offer first?",
      stress:"You're stretched thin yourself, and someone close to you turns to you for support. What do you naturally offer first?",
      options:[
        { t:"analytical", text:"I ask questions to understand the situation clearly before responding." },
        { t:"emotional", text:"I feel what they're feeling almost as if it were my own." },
        { t:"overthinking", text:"I worry afterward about whether I said the right things." },
        { t:"action", text:"I jump straight to trying to help them fix or solve it." },
        { t:"balanced", text:"I listen fully first, then offer whatever feels genuinely useful." }
      ]
    },
    { id:"quiet_evening", category:"self",
      calm:"You unexpectedly end up with a free evening, nothing planned. What do you actually do with it?",
      stress:"In a season that's felt nonstop, you unexpectedly get a free evening. What do you actually do with it?",
      options:[
        { t:"analytical", text:"I use it productively, catching up on something that's been on my list." },
        { t:"emotional", text:"I do whatever matches how I'm feeling in that exact moment." },
        { t:"overthinking", text:"I spend some of it deciding what to do, and second-guessing the choice." },
        { t:"action", text:"I fill it fast with something, plans, errands, anything but stillness." },
        { t:"balanced", text:"I check in with myself first, then choose something that actually feels restful." }
      ]
    },
    { id:"before_big_moment", category:"self",
      calm:"You're about to walk into something important \u2014 an interview, a performance, a big conversation. What's happening in you right before?",
      stress:"Everything already feels like a lot, and now you're about to walk into something important. What's happening in you right before?",
      options:[
        { t:"analytical", text:"I mentally run through my preparation one more time." },
        { t:"emotional", text:"Nerves show up in my body before any thought does." },
        { t:"overthinking", text:"I replay worst-case scenarios more than I'd like to admit." },
        { t:"action", text:"I take a breath and just walk in, trusting I'll adjust as I go." },
        { t:"balanced", text:"I acknowledge the nerves, remind myself I'm ready, and go in steady." }
      ]
    }
  ];

  var SESSION_SCENARIO_COUNT = 5;

  // Picks a fresh, varied set of scenarios for this session.
  // Always includes one "romance" scenario, then fills the rest with
  // distinct random categories so no two sessions feel the same.
  function pickSessionScenarios(n){
    var byCategory = {};
    SCENARIO_POOL.forEach(function(s){
      (byCategory[s.category] = byCategory[s.category] || []).push(s);
    });
    var allCategories = Object.keys(byCategory);
    var guaranteed = allCategories.indexOf("romance") !== -1 ? ["romance"] : [];
    var remaining = shuffle(allCategories.filter(function(c){ return guaranteed.indexOf(c) === -1; }));
    var chosenCategories = guaranteed.concat(remaining).slice(0, n);
    var picked = chosenCategories.map(function(cat){
      var options = byCategory[cat];
      return options[Math.floor(Math.random() * options.length)];
    });
    return shuffle(picked);
  }

  var PRIORITY_CARDS = [
    { id:"p-analytical", t:"analytical", label:"Getting it right", sub:"Accuracy over speed" },
    { id:"p-emotional", t:"emotional", label:"Following the feeling", sub:"Trusting your gut" },
    { id:"p-overthinking", t:"overthinking", label:"Weighing every angle", sub:"Leaving no stone unturned" },
    { id:"p-action", t:"action", label:"Moving quickly", sub:"Momentum over hesitation" },
    { id:"p-balanced", t:"balanced", label:"Keeping perspective", sub:"Holding head and heart together" }
  ];

  var TIMELINE_STEPS = [
    { id:"tl-emotional", t:"emotional", label:"Feel it first", sub:"The reaction arrives before the thought" },
    { id:"tl-analytical", t:"analytical", label:"Think it through", sub:"Lay out the logic" },
    { id:"tl-overthinking", t:"overthinking", label:"Circle back again", sub:"Revisit it more than once" },
    { id:"tl-action", t:"action", label:"Just start", sub:"Move before it's fully settled" },
    { id:"tl-balanced", t:"balanced", label:"Check if it feels right", sub:"Take a breath and weigh it overall" }
  ];

  var CHAPTER_LABELS = ["Style","Priorities","Timeline","Journal"];

  /* =========================================================
     STATE
  ========================================================= */
  var state = {
    mode: "calm",
    screen: "start", // start | c1 | c2 | c3 | journal
    c1Index: 0,
    c1Answers: {},           // scenarioId -> tendency
    scenarios: pickSessionScenarios(SESSION_SCENARIO_COUNT),
    c2Order: shuffle(PRIORITY_CARDS.map(function(c){ return c.id; })),
    c3Order: shuffle(TIMELINE_STEPS.map(function(c){ return c.id; })),
    scores: null,
    aiText: null,
    aiFailed: false
  };

  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  /* =========================================================
     SCORING
  ========================================================= */
  function computeScores(){
    var raw = { analytical:0, emotional:0, overthinking:0, action:0, balanced:0 };

    // Chapter 1: each answered scenario contributes weight 3 to its tendency
    Object.keys(state.c1Answers).forEach(function(sid){
      var t = state.c1Answers[sid];
      raw[t] += 3;
    });

    // Chapter 2 & 3: rank position contributes weight 5..1
    applyRankWeights(state.c2Order, PRIORITY_CARDS, raw);
    applyRankWeights(state.c3Order, TIMELINE_STEPS, raw);

    var total = TENDENCIES.reduce(function(sum, t){ return sum + raw[t]; }, 0);
    var pct = {};
    TENDENCIES.forEach(function(t){
      pct[t] = total > 0 ? Math.round((raw[t] / total) * 100) : 20;
    });
    // adjust rounding drift so total is exactly 100
    var diff = 100 - TENDENCIES.reduce(function(s,t){ return s + pct[t]; }, 0);
    if (diff !== 0){
      var sorted = TENDENCIES.slice().sort(function(a,b){ return pct[b]-pct[a]; });
      pct[sorted[0]] += diff;
    }
    return { raw: raw, pct: pct };
  }

  function applyRankWeights(orderArray, itemDefs, raw){
    var byId = {};
    itemDefs.forEach(function(d){ byId[d.id] = d; });
    orderArray.forEach(function(id, idx){
      var weight = orderArray.length - idx; // first place = highest weight
      var def = byId[id];
      if (def) raw[def.t] += weight;
    });
  }

  /* =========================================================
     RENDER: shell / progress thread
  ========================================================= */
  var screenHost = document.getElementById("screen-host");
  var threadWrap = document.getElementById("thread-wrap");
  var liveRegion = document.getElementById("live-region");

  function chapterIndexFor(screen){
    return { start:-1, c1:0, c2:1, c3:2, journal:3 }[screen];
  }

  function renderThread(){
    var idx = chapterIndexFor(state.screen);
    if (idx === -1){ threadWrap.innerHTML = ""; return; }
    var n = 4;
    var width = 560, y = 20, pad = 30;
    var step = (width - pad * 2) / (n - 1);
    var totalLen = width - pad * 2;
    var progressFrac = idx / (n - 1);
    var dashOffset = totalLen * (1 - progressFrac);

    var nodes = "";
    for (var i = 0; i < n; i++){
      var cx = pad + step * i;
      var cls = "thread-node";
      if (i < idx) cls += " done";
      else if (i === idx) cls += " done current pulse";
      nodes += '<circle class="' + cls + '" cx="' + cx + '" cy="' + y + '" r="6.5"></circle>';
    }

    threadWrap.innerHTML =
      '<svg viewBox="0 0 ' + width + ' 40" role="img" aria-label="Progress: step ' + (idx+1) + ' of ' + n + '">' +
        '<line class="thread-track" x1="' + pad + '" y1="' + y + '" x2="' + (width-pad) + '" y2="' + y + '"></line>' +
        '<line class="thread-fill" x1="' + pad + '" y1="' + y + '" x2="' + (width-pad) + '" y2="' + y + '" ' +
          'stroke-dasharray="' + totalLen + '" stroke-dashoffset="' + dashOffset + '"></line>' +
        nodes +
      '</svg>' +
      '<div class="thread-labels">' +
        CHAPTER_LABELS.map(function(l){ return '<span>' + l + '</span>'; }).join("") +
      '</div>';
  }

  function mount(html, focusSelector){
    var el = document.createElement("div");
    el.className = "screen";
    el.innerHTML = html;
    screenHost.innerHTML = "";
    screenHost.appendChild(el);
    document.body.setAttribute("data-mode", state.mode);
    renderThread();
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){ el.classList.add("active"); });
    });
    var focusTarget = focusSelector ? el.querySelector(focusSelector) : el.querySelector("h1,h2");
    if (focusTarget){
      focusTarget.setAttribute("tabindex", "-1");
      setTimeout(function(){ focusTarget.focus(); }, 350);
    }
    return el;
  }

  function announce(msg){ liveRegion.textContent = msg; }

  /* =========================================================

  var c1OptionOrderCache = {}; // scenarioId -> shuffled option array (stable per session)

    state.screen = "c1";

  /* =========================================================
     GENERIC DRAG-SORT LIST COMPONENT
     Reused by Chapter 2 (priority cards) and Chapter 3 (timeline)
  ========================================================= */
  function createDragSortList(opts){
    // opts: { container, order (array of ids), itemsById, rankLabel(idx)->string, onChange }
    var container = opts.container;
    var itemsById = opts.itemsById;
    var order = opts.order.slice();
    var dragSrcIndex = null;
    var touchState = null;

    function render(){
      container.innerHTML = "";
      order.forEach(function(id, idx){
        var def = itemsById[id];
        var li = document.createElement("li");
        li.className = "drag-item";
        li.setAttribute("draggable", "true");
        li.setAttribute("data-id", id);
        li.setAttribute("role", "listitem");
        li.innerHTML =
          '<span class="drag-rank" aria-hidden="true">' + opts.rankLabel(idx) + '</span>' +
          '<span class="drag-handle" aria-hidden="true" title="Drag to reorder">' +
            '<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">' +
              '<circle cx="5" cy="3" r="1.4"></circle><circle cx="11" cy="3" r="1.4"></circle>' +
              '<circle cx="5" cy="8" r="1.4"></circle><circle cx="11" cy="8" r="1.4"></circle>' +
              '<circle cx="5" cy="13" r="1.4"></circle><circle cx="11" cy="13" r="1.4"></circle>' +
            '</svg>' +
          '</span>' +
          '<span class="drag-body"><strong>' + def.label + '</strong><span>' + def.sub + '</span></span>' +
          '<span class="drag-buttons">' +
            '<button type="button" data-dir="up" aria-label="Move ' + def.label + ' up" ' + (idx===0?"disabled":"") + '>\u2191</button>' +
            '<button type="button" data-dir="down" aria-label="Move ' + def.label + ' down" ' + (idx===order.length-1?"disabled":"") + '>\u2193</button>' +
          '</span>';
        container.appendChild(li);

        // native DnD
        li.addEventListener("dragstart", function(e){
          dragSrcIndex = idx;
          li.classList.add("dragging");
          e.dataTransfer.effectAllowed = "move";
          try { e.dataTransfer.setData("text/plain", id); } catch(err){}
        });
        li.addEventListener("dragend", function(){
          li.classList.remove("dragging");
          container.querySelectorAll(".drag-item").forEach(function(n){ n.classList.remove("drag-over"); });
        });
        li.addEventListener("dragover", function(e){
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          li.classList.add("drag-over");
        });
        li.addEventListener("dragleave", function(){ li.classList.remove("drag-over"); });
        li.addEventListener("drop", function(e){
          e.preventDefault();
          li.classList.remove("drag-over");
          var targetIndex = idx;
          if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
          moveItem(dragSrcIndex, targetIndex);
          dragSrcIndex = null;
        });

        // touch fallback
        var handle = li.querySelector(".drag-handle");
        handle.addEventListener("touchstart", function(e){
          touchState = { startY: e.touches[0].clientY, fromIndex: idx };
          li.classList.add("dragging");
        }, { passive:true });
        handle.addEventListener("touchmove", function(e){
          if (!touchState) return;
          e.preventDefault();
          var touchY = e.touches[0].clientY;
          var items = Array.prototype.slice.call(container.querySelectorAll(".drag-item"));
          for (var k=0; k<items.length; k++){
            var rect = items[k].getBoundingClientRect();
            if (touchY > rect.top && touchY < rect.bottom){
              items[k].classList.add("drag-over");
            } else {
              items[k].classList.remove("drag-over");
            }
          }
        }, { passive:false });
        handle.addEventListener("touchend", function(e){
          if (!touchState) return;
          li.classList.remove("dragging");
          var touchY = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientY : null;
          var items = Array.prototype.slice.call(container.querySelectorAll(".drag-item"));
          var targetIndex = touchState.fromIndex;
          if (touchY !== null){
            for (var k=0; k<items.length; k++){
              var rect = items[k].getBoundingClientRect();
              items[k].classList.remove("drag-over");
              if (touchY > rect.top && touchY < rect.bottom){ targetIndex = k; }
            }
          }
          if (targetIndex !== touchState.fromIndex){
            moveItem(touchState.fromIndex, targetIndex);
          }
          touchState = null;
        });

        // keyboard buttons
        li.querySelectorAll(".drag-buttons button").forEach(function(btn){
          btn.addEventListener("click", function(){
            var dir = btn.getAttribute("data-dir");
            var from = idx;
            var to = dir === "up" ? idx - 1 : idx + 1;
            if (to < 0 || to >= order.length) return;
            moveItem(from, to);
            var newBtn = container.querySelectorAll('[data-id="' + id + '"] .drag-buttons button[data-dir="' + dir + '"]');
          });
        });
      });
    }

    function moveItem(from, to){
      var id = order.splice(from, 1)[0];
      order.splice(to, 0, id);
      render();
      opts.onChange(order.slice());
      var movedLi = container.querySelector('[data-id="' + id + '"]');
      if (movedLi){
        var handleBtn = movedLi.querySelector(".drag-buttons button");
        if (handleBtn) handleBtn.focus();
      }
    }

    render();
    return { getOrder: function(){ return order.slice(); } };
  }

  function drawJourneyMap(){
    // A small abstract line derived from the user's own chapter-3 ordering:
    // each step's tendency maps to a color and a y-offset, forming a personal "pattern line".
    var byId = {}; TIMELINE_STEPS.forEach(function(c){ byId[c.id] = c; });
    var w = 400, h = 120, pad = 30;
    var n = state.c3Order.length;
    var stepX = (w - pad*2) / (n - 1);
    var yFor = { analytical:30, balanced:60, action:90, emotional:45, overthinking:75 };

    var points = state.c3Order.map(function(id, idx){
      var t = byId[id].t;
      var x = pad + stepX * idx;
      var y = yFor[t] !== undefined ? yFor[t] : 60;
      return { x:x, y:y, t:t };
    });

    var pathD = points.map(function(p, idx){
      return (idx === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1);
    }).join(" ");

    var dotsHtml = points.map(function(p){
      return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="5" fill="' + TENDENCY_META[p.t].color + '"></circle>';
    }).join("");

    var svg =
      '<svg viewBox="0 0 ' + w + ' ' + h + '" role="img" aria-label="An abstract line representing the order of your thinking process">' +
        '<path d="' + pathD + '" fill="none" stroke="#C7CFC5" stroke-width="2"></path>' +
        dotsHtml +
      '</svg>';
    document.getElementById("journal-map").innerHTML = svg;
  }

  function fetchAIReflection(top1, top2, pct){
    var loadingEl = document.getElementById("ai-loading");
    var controller = (typeof AbortController !== "undefined") ? new AbortController() : null;
    var timeoutId = controller ? setTimeout(function(){ controller.abort(); }, 9000) : null;

    fetch("/.netlify/functions/reflect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        scores: pct,
        topTwo: [TENDENCY_META[top1].name, TENDENCY_META[top2].name],
        mode: state.mode
      }),
      signal: controller ? controller.signal : undefined
    }).then(function(res){
      if (!res.ok) throw new Error("AI reflection unavailable");
      return res.json();
    }).then(function(data){
      if (timeoutId) clearTimeout(timeoutId);
      if (data && data.text){
        var block = document.getElementById("reflection-block");
        block.innerHTML = '<span class="ai-tag">\u2728 Personalized reflection</span><p id="reflection-text">' + escapeHtml(data.text) + '</p>';
        state.aiText = data.text;
      }
      if (loadingEl) loadingEl.remove();
    }).catch(function(){
      if (timeoutId) clearTimeout(timeoutId);
      state.aiFailed = true;
      if (loadingEl){
        loadingEl.textContent = "Showing your default reflection (personalized version unavailable right now).";
        loadingEl.querySelector && null;
      }
      setTimeout(function(){ if (loadingEl) loadingEl.style.display = "none"; }, 4000);
    });
  }

  function escapeHtml(str){
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function exportJournal(){
    var pct = state.scores.pct;
    var sortedT = TENDENCIES.slice().sort(function(a,b){ return pct[b]-pct[a]; });
    var lines = [];
    lines.push("COGNITIVE PATTERN EXPLORER \u2014 Reflection Journal");
    lines.push("Mode: " + (state.mode === "stress" ? "Stress" : "Calm"));
    lines.push("");
    lines.push("Your pattern breakdown:");
    sortedT.forEach(function(t){
      lines.push("- " + TENDENCY_META[t].name + ": " + pct[t] + "%");
    });
    lines.push("");
    lines.push("Reflection:");
    lines.push(state.aiText || document.getElementById("reflection-text").textContent);
    lines.push("");
    lines.push("Reminder: this is a self-reflection tool, not a clinical assessment.");

    var blob = new Blob([lines.join("\n")], { type: "text/plain" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "cognitive-pattern-journal.txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  }

  function resetState(){
    state.c1Index = 0;
    state.c1Answers = {};
    state.scenarios = pickSessionScenarios(SESSION_SCENARIO_COUNT);
    state.c2Order = shuffle(PRIORITY_CARDS.map(function(c){ return c.id; }));
    state.c3Order = shuffle(TIMELINE_STEPS.map(function(c){ return c.id; }));
    state.scores = null;
    state.aiText = null;
    state.aiFailed = false;
    c1OptionOrderCache = {};
  }

  /* =========================================================
     INIT
  ========================================================= */
  renderStart();
})();
</script>
</body>
</html>
